name: Generate Parseltongue Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: navneat-codes
          outputs: |
            dist/parseltongue-snake.svg?palette=github-dark&color_snake=39ff14&color_dots=161b22,003d1f,006d32,00a84f,39ff14

      - name: Push snake animation
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
