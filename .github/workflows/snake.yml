name: 🐍 Generate Basilisk Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: navneat-codes
          outputs: |
            dist/basilisk-snake.svg?color_snake=#39FF14&color_dots=#001a00,#003300,#006400,#00aa55,#39FF14
            dist/basilisk-snake-dark.svg?palette=github-dark&color_snake=#39FF14&color_dots=#001a00,#003300,#006400,#00aa55,#39FF14

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
