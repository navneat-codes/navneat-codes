name: 🐍 Generate Slytherin Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: navneat-codes
          outputs: |
            dist/slytherin-snake.svg?color_snake=#00FF7F&color_dots=#013220,#014421,#016936,#00FF7F,#39FF14
            dist/slytherin-snake-dark.svg?palette=github-dark&color_snake=#39FF14

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
